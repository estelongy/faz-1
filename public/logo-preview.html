<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<title>Logo Öneri</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0f1a; font-family: system-ui, sans-serif; padding: 48px 32px; color: #fff; }
  h2 { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #475569; margin-bottom: 20px; }
  .row { display: flex; align-items: center; gap: 32px; margin-bottom: 48px; flex-wrap: wrap; }
  .label { font-size: 11px; color: #475569; margin-top: 8px; text-align: center; }
  .divider { width: 100%; height: 1px; background: #1e293b; margin: 16px 0 40px; }
  .bg-light { background: #f1f5f9; border-radius: 12px; padding: 16px; }
</style>
</head>
<body>

<h2>Versiyon A — Minimal Monogram (önerilen UI logosu)</h2>
<div class="row">

  <!-- LARGE -->
  <div>
    <svg width="180" height="56" viewBox="0 0 180 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Icon -->
      <g>
        <!-- Circle bg -->
        <circle cx="28" cy="28" r="22" fill="url(#grad_a)" opacity="0.15"/>
        <circle cx="28" cy="28" r="22" stroke="url(#grad_a)" stroke-width="1.5" fill="none"/>
        <!-- Face profile silhouette -->
        <path d="M26 14 C22 14 19 17 19 21 C19 24 20.5 26.5 23 28 L23 32 C23 33.1 23.9 34 25 34 L31 34 C32.1 34 33 33.1 33 32 L33 28 C35.5 26.5 37 24 37 21 C37 17 34 14 30 14 Z" fill="url(#grad_a)" opacity="0.9"/>
        <!-- DNA helix simplified — two crossing curves -->
        <path d="M33 18 Q36 21 33 24 Q36 27 33 30" stroke="#7c3aed" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M35 18 Q32 21 35 24 Q32 27 35 30" stroke="#a78bfa" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <!-- Horizontal bars of DNA -->
        <line x1="33" y1="18.5" x2="35" y2="18.5" stroke="#7c3aed" stroke-width="1" opacity="0.8"/>
        <line x1="32.5" y1="21" x2="35.5" y2="21" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
        <line x1="33" y1="23.5" x2="35" y2="23.5" stroke="#7c3aed" stroke-width="1" opacity="0.8"/>
        <line x1="32.5" y1="26" x2="35.5" y2="26" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
        <line x1="33" y1="28.5" x2="35" y2="28.5" stroke="#7c3aed" stroke-width="1" opacity="0.8"/>
      </g>
      <!-- Wordmark -->
      <text x="60" y="24" font-family="system-ui" font-size="18" font-weight="800" fill="white" letter-spacing="-0.5">Estelongy</text>
      <text x="61" y="39" font-family="system-ui" font-size="9" font-weight="500" fill="#7c3aed" letter-spacing="3">AESTHETIC &amp; LONGEVITY</text>
      <defs>
        <linearGradient id="grad_a" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#7c3aed"/>
          <stop offset="100%" stop-color="#a78bfa"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="label">Full — nav bar</div>
  </div>

  <!-- MEDIUM -->
  <div>
    <svg width="40" height="40" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="28" cy="28" r="26" fill="url(#grad_b)" opacity="0.15"/>
      <circle cx="28" cy="28" r="26" stroke="url(#grad_b)" stroke-width="1.5" fill="none"/>
      <path d="M26 14 C22 14 19 17 19 21 C19 24 20.5 26.5 23 28 L23 32 C23 33.1 23.9 34 25 34 L31 34 C32.1 34 33 33.1 33 32 L33 28 C35.5 26.5 37 24 37 21 C37 17 34 14 30 14 Z" fill="url(#grad_b)" opacity="0.9"/>
      <path d="M33 18 Q36 21 33 24 Q36 27 33 30" stroke="#7c3aed" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M35 18 Q32 21 35 24 Q32 27 35 30" stroke="#a78bfa" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <line x1="33" y1="18.5" x2="35" y2="18.5" stroke="#7c3aed" stroke-width="1" opacity="0.8"/>
      <line x1="32.5" y1="21" x2="35.5" y2="21" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
      <line x1="33" y1="23.5" x2="35" y2="23.5" stroke="#7c3aed" stroke-width="1" opacity="0.8"/>
      <line x1="32.5" y1="26" x2="35.5" y2="26" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
      <line x1="33" y1="28.5" x2="35" y2="28.5" stroke="#7c3aed" stroke-width="1" opacity="0.8"/>
      <defs>
        <linearGradient id="grad_b" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#7c3aed"/>
          <stop offset="100%" stop-color="#a78bfa"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="label">40px</div>
  </div>

  <!-- SMALL -->
  <div>
    <svg width="24" height="24" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="28" cy="28" r="26" fill="#7c3aed" opacity="0.2"/>
      <circle cx="28" cy="28" r="26" stroke="#7c3aed" stroke-width="2" fill="none"/>
      <path d="M26 14 C22 14 19 17 19 21 C19 24 20.5 26.5 23 28 L23 32 C23 33.1 23.9 34 25 34 L31 34 C32.1 34 33 33.1 33 32 L33 28 C35.5 26.5 37 24 37 21 C37 17 34 14 30 14 Z" fill="#a78bfa"/>
      <path d="M33 18 Q36 21 33 24 Q36 27 33 30" stroke="#7c3aed" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M35 18 Q32 21 35 24 Q32 27 35 30" stroke="#c4b5fd" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    </svg>
    <div class="label">24px / favicon</div>
  </div>

</div>

<div class="divider"></div>

<h2>Versiyon B — Köşeli Kare (mevcut siteyle uyumlu)</h2>
<div class="row">

  <!-- LARGE B -->
  <div>
    <svg width="180" height="56" viewBox="0 0 180 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="8" width="40" height="40" rx="10" fill="url(#grad_c)"/>
      <!-- Face profile + DNA combined -->
      <path d="M20 18 C17 18 15 20 15 23 C15 25.5 16.2 27.5 18 29 L18 33 C18 33.6 18.4 34 19 34 L25 34 C25.6 34 26 33.6 26 33 L26 29 C27.8 27.5 29 25.5 29 23 C29 20 27 18 24 18 Z" fill="white" opacity="0.95"/>
      <path d="M27 20 Q30 22.5 27 25 Q30 27.5 27 30" stroke="white" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.7"/>
      <path d="M29.5 20 Q26.5 22.5 29.5 25 Q26.5 27.5 29.5 30" stroke="white" stroke-width="1.1" fill="none" stroke-linecap="round" opacity="0.5"/>
      <!-- wordmark -->
      <text x="52" y="24" font-family="system-ui" font-size="18" font-weight="800" fill="white" letter-spacing="-0.5">Estelongy</text>
      <text x="53" y="39" font-family="system-ui" font-size="9" font-weight="500" fill="#7c3aed" letter-spacing="3">AESTHETIC &amp; LONGEVITY</text>
      <defs>
        <linearGradient id="grad_c" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#7c3aed"/>
          <stop offset="100%" stop-color="#6d28d9"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="label">Full — nav bar</div>
  </div>

  <!-- ICON B 40px -->
  <div>
    <svg width="40" height="40" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="48" height="48" rx="12" fill="url(#grad_d)"/>
      <path d="M21 11 C17 11 14 14 14 18 C14 21 15.5 23.5 18 25 L18 30 C18 31.1 18.9 32 20 32 L26 32 C27.1 32 28 31.1 28 30 L28 25 C30.5 23.5 32 21 32 18 C32 14 29 11 25 11 Z" fill="white" opacity="0.95"/>
      <path d="M29 14 Q33 17 29 20 Q33 23 29 26" stroke="white" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.65"/>
      <path d="M32 14 Q28 17 32 20 Q28 23 32 26" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.45"/>
      <defs>
        <linearGradient id="grad_d" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#7c3aed"/>
          <stop offset="100%" stop-color="#6d28d9"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="label">40px</div>
  </div>

  <!-- ICON B 24px -->
  <div>
    <svg width="24" height="24" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="48" height="48" rx="12" fill="#7c3aed"/>
      <path d="M21 11 C17 11 14 14 14 18 C14 21 15.5 23.5 18 25 L18 30 C18 31.1 18.9 32 20 32 L26 32 C27.1 32 28 31.1 28 30 L28 25 C30.5 23.5 32 21 32 18 C32 14 29 11 25 11 Z" fill="white"/>
      <path d="M29 14 Q33 17 29 20 Q33 23 29 26" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.6"/>
      <path d="M32 14 Q28 17 32 20 Q28 23 32 26" stroke="white" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.4"/>
    </svg>
    <div class="label">24px / favicon</div>
  </div>
</div>

<div class="divider"></div>

<h2>Açık arka plan testi (kartvizit, kağıt)</h2>
<div class="row">
  <div class="bg-light">
    <svg width="180" height="56" viewBox="0 0 180 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="8" width="40" height="40" rx="10" fill="url(#grad_e)"/>
      <path d="M21 11 C17 11 14 14 14 18 C14 21 15.5 23.5 18 25 L18 30 C18 31.1 18.9 32 20 32 L26 32 C27.1 32 28 31.1 28 30 L28 25 C30.5 23.5 32 21 32 18 C32 14 29 11 25 11 Z" fill="white" opacity="0.95"/>
      <path d="M29 14 Q33 17 29 20 Q33 23 29 26" stroke="white" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.65"/>
      <path d="M32 14 Q28 17 32 20 Q28 23 32 26" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.45"/>
      <text x="52" y="24" font-family="system-ui" font-size="18" font-weight="800" fill="#1e293b" letter-spacing="-0.5">Estelongy</text>
      <text x="53" y="39" font-family="system-ui" font-size="9" font-weight="500" fill="#7c3aed" letter-spacing="3">AESTHETIC &amp; LONGEVITY</text>
      <defs>
        <linearGradient id="grad_e" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#7c3aed"/>
          <stop offset="100%" stop-color="#6d28d9"/>
        </linearGradient>
      </defs>
    </svg>
  </div>
</div>

</body>
</html>
